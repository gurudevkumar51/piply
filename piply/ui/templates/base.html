<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Piply{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <nav class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">pl</span>
                <span class="brand-text">
                    <span class="brand-name">Piply</span>
                    <span class="brand-subtitle">{{ project.title }}</span>
                </span>
            </a>

            <div class="nav-links">
                <a class="nav-link {% if page == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
                <a class="nav-link {% if page == 'pipelines' %}active{% endif %}" href="/pipelines">Pipelines</a>
                <a class="nav-link {% if page == 'runs' %}active{% endif %}" href="/runs">Runs</a>
            </div>

            <div class="scheduler-chip" title="Config: {{ scheduler.config_path }}">
                <span class="status-dot"></span>
                {% if scheduler.running %}scheduler live{% else %}scheduler offline{% endif %}
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
