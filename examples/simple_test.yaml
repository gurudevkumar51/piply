pipeline:
  name: simple_test_pipeline
  steps:
    - name: step1
      type: python
      function: "pipelines.extract_appointments.main"

    - name: step2
      type: shell
      command: "echo 'Step 2 completed'"
      depends_on:
        - step1

    - name: step3
      type: python
      function: "pipelines.report.send_completion_report"
      depends_on:
        - step2